name: Wisecow CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/wisecow

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build and Push Docker image to Docker Hub
  # Runs on GitHub-hosted runner
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image tags
        run: |
          echo " Image pushed:"
          echo "${{ steps.meta.outputs.tags }}"

  # ─────────────────────────────────────────────
  # JOB 2: Deploy to Minikube via self-hosted runner
  # Runs on your local machine (self-hosted runner)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted          # <-- your local machine
    needs: build-and-push         # only runs after image is pushed
    if: github.ref == 'refs/heads/main'   # only on main branch pushes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=sha-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Update deployment image
        run: |
          kubectl set image deployment/wisecow-deployment \
            wisecow=${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }} \
            --record

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/wisecow-deployment \
            --timeout=120s

      - name: Verify pods are running
        run: |
          kubectl get pods -l app=wisecow
          kubectl get ingress wisecow-ingress

      - name: Print deployment summary
        run: |
          echo " Deployed image: ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          echo "App accessible at: https://wisecow.local"