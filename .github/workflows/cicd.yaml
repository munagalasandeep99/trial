name: Wisecow CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/wisecow

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Build and Push Docker image to Docker Hub
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.run_number }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image info
        run: |
          echo " Image pushed: ${{ env.IMAGE_NAME }}:${{ github.run_number }}"

  # ─────────────────────────────────────────────
  # JOB 2: Update image tag in deployment YAML
  # Same pattern as your Jenkins pipeline
  # ─────────────────────────────────────────────
  update-manifest:
    name: Update Deployment Manifest
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in wisecow-deployment.yaml
        run: |
          # Get current image tag from deployment yaml
          imageTag=$(grep -oP '(?<=wisecow:)[^ ]+' wisecow-deployment.yaml)
          echo "Current tag: $imageTag"
          echo "New tag: ${{ github.run_number }}"

          # Replace old tag with new build number (same as your Jenkins sed command)
          sed -i "s|${{ env.IMAGE_NAME }}:${imageTag}|${{ env.IMAGE_NAME }}:${{ github.run_number }}|" wisecow-deployment.yaml

          echo "Updated wisecow-deployment.yaml:"
          grep "image:" wisecow-deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.email "sandeepreddymunagala@gmail.com"
          git config user.name "munagalasandeep99"
          git add wisecow-deployment.yaml
          git commit -m "Update deployment image to version ${{ github.run_number }}"
          git push origin main

  # ─────────────────────────────────────────────
  # JOB 3: Deploy to Minikube via self-hosted runner
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Minikube
    runs-on: self-hosted
    needs: update-manifest

    steps:
      - name: Checkout updated repository
        uses: actions/checkout@v4
        with:
          ref: main   # pull latest commit (with updated image tag)

      - name: Apply updated deployment manifest
        run: |
          kubectl apply -f wisecow-deployment.yaml

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/wisecow-deployment --timeout=120s

      - name: Verify pods are running
        run: |
          kubectl get pods -l app=wisecow
          kubectl get ingress wisecow-ingress

      - name: Print deployment summary
        run: |
          echo " Deployed: ${{ env.IMAGE_NAME }}:${{ github.run_number }}"
          echo " App: https://wisecow.local"